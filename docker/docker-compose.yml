# =============================================================================
# File        : docker/docker-compose.yml
# Author      : Prakhar Srivastava
# Date        : 2026-06-21
# Description : -> Local full-stack development orchestration.
#               -> Brings up:
#                      api        - FastAPI inference server
#                      ui         - Gradio demo
#                      mlflow     - Experiment + (local) registry server
#                      minio      - S3-compatible artifact backend for MLflow
#                      prometheus - metrics scrape (targets the API)
#                      grafana    - dashboards on top of prometheus
#
#               -> DVC's remote lives in Google Drive (see .env / k8s secret),
#                  NOT in MinIO. MinIO here is exclusively MLflow's artifact
#                  store for local runs.
#
#               -> `make docker-up` is the canonical entrypoint.
# =============================================================================

services:

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../models:/app/models:ro
      - ../config:/app/config:ro
    depends_on:
      - mlflow

  ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ui
    ports:
      - "7860:7860"
    env_file:
      - ../.env
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      - api

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.0
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri sqlite:////mlflow/mlflow.db
        --default-artifact-root s3://mlflow/
    environment:
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
    volumes:
      - mlflow-data:/mlflow
    ports:
      - "5000:5000"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  mlflow-data:
  minio-data:
  grafana-data: