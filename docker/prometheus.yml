# =============================================================================
# File        : docker/prometheus.yml
# Author      : Prakhar Srivastava
# Date        : 2026-06-21
# Description : -> Prometheus scrape configuration for the local docker-compose
#                  stack. Targets the FastAPI service on its /metrics endpoint
#                  every 15s; that endpoint is mounted by src/api/main.py via
#                  prometheus_client.make_asgi_app().
#
#               -> In Kubernetes you'd typically use a Prometheus Operator
#                  ServiceMonitor instead of this static config.
# =============================================================================

global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  # The FastAPI app. `api` is the docker-compose service name and resolves
  # via the compose-managed Docker network.
  - job_name: stock-chart-predictor-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8000

  # Prometheus scraping itself — useful for catching scrape-config errors.
  - job_name: prometheus-self
    static_configs:
      - targets:
          - localhost:9090
