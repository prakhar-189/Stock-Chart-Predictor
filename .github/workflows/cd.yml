# =============================================================================
# File        : .github/workflows/cd.yml
# Author      : Prakhar Srivastava
# Date        : 2026-06-21
# Description : Continuous deployment. On a tag push, builds and publishes
#               the API and UI images to GHCR, then triggers a GKE rollout.
# =============================================================================

name: CD

on:
  push:
    tags: [ 'v*' ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ghcr.io/${{ github.repository }}-api:${{ github.ref_name }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.ui
          push: true
          tags: ghcr.io/${{ github.repository }}-ui:${{ github.ref_name }}