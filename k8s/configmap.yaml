apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: stock-chart-predictor
data:
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  API_LOG_LEVEL: "INFO"
  MLFLOW_TRACKING_URI: "http://mlflow.stock-chart-predictor.svc.cluster.local:5000"
  API_BASE_URL: "http://api.stock-chart-predictor.svc.cluster.local:8000"