# =============================================================================
# File        : k8s/secret.example.yaml
# Author      : Prakhar Srivastava
# Date        : 2026-06-21
# Description : Template — never commit real secrets. Use one of:
#                 kubectl create secret generic app-secrets ...
#                 sealed-secrets / external-secrets / Vault, etc.
#               This file documents the expected keys so contributors know
#               what the running app reads from its mounted secret.
#
#               -> OPENAI_API_KEY               : LLM explainer auth.
#               -> GDRIVE_SERVICE_ACCOUNT_JSON  : DVC remote auth — the full
#                                                contents of the GCP service-
#                                                account JSON key, kept as a
#                                                literal block scalar.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: stock-chart-predictor
type: Opaque
stringData:
  OPENAI_API_KEY: "replace-me"
  GDRIVE_SERVICE_ACCOUNT_JSON: |
    {
      "type": "service_account",
      "project_id": "replace-me",
      "private_key_id": "replace-me",
      "private_key": "-----BEGIN PRIVATE KEY-----\nreplace-me\n-----END PRIVATE KEY-----\n",
      "client_email": "replace-me@replace-me.iam.gserviceaccount.com",
      "client_id": "replace-me",
      "auth_uri": "https://accounts.google.com/o/oauth2/auth",
      "token_uri": "https://oauth2.googleapis.com/token"
    }
