apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: stock-chart-predictor
type: Opaque
stringData:
  OPENAI_API_KEY: "replace-me"
  ANTHROPIC_API_KEY: "replace-me"
  DVC_REMOTE_ACCESS_KEY_ID: "replace-me"
  DVC_REMOTE_SECRET_ACCESS_KEY: "replace-me"