# Description : Routes /api -> API service, / -> UI service.
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app
  namespace: stock-chart-predictor
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: stock-chart.example.com
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend: { service: { name: api, port: { number: 8000 } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: ui,  port: { number: 7860 } } }