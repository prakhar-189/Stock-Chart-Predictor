# --------------------------------------------------------------
# pyproject.toml — tooling config (NOT a build spec).
# Dependencies are managed via requirements*.txt for clarity.
# --------------------------------------------------------------

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N"]
ignore = ["E501"]  # line length handled by formatter

[tool.ruff.lint.per-file-ignores]
# FastAPI's `File(...)` / `Form(...)` / `Depends(...)` in default args is the
# documented framework pattern, not the anti-pattern B008 normally catches.
"src/api/*.py" = ["B008"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = true
no_implicit_optional = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q --strict-markers"
markers = [
    "integration: integration tests (may require network)",
    "slow: tests that take more than ~1s",
]